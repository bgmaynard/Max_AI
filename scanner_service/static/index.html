<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX_AI Scanner Dashboard</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-hover: #30363d;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-green: #238636;
            --accent-green-light: #2ea043;
            --accent-red: #da3633;
            --accent-yellow: #d29922;
            --accent-blue: #58a6ff;
            --accent-purple: #a371f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span { color: var(--accent-green-light); }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 4px 10px;
            background: var(--bg-tertiary);
            border-radius: 12px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-green);
        }

        .status-dot.error { background: var(--accent-red); }

        /* Buttons */
        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
        }

        .btn:hover { background: var(--bg-hover); border-color: var(--text-secondary); }
        .btn-primary { background: var(--accent-green); border-color: var(--accent-green); }
        .btn-primary:hover { background: var(--accent-green-light); }
        .btn-sm { padding: 4px 8px; font-size: 11px; }
        .btn-icon { padding: 6px; }

        /* Dashboard - Free-form layout */
        .dashboard {
            position: relative;
            padding: 12px;
            height: calc(100vh - 50px);
            overflow: auto;
        }

        /* Panel */
        .panel {
            position: absolute;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            min-width: 400px;
            min-height: 250px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: box-shadow 0.2s;
        }

        .panel:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }

        .panel.dragging {
            opacity: 0.9;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .panel-header {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-tertiary);
            border-radius: 8px 8px 0 0;
            cursor: move;
        }

        /* Resize handle */
        .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 16px;
            height: 16px;
            cursor: se-resize;
            background: linear-gradient(135deg, transparent 50%, var(--border-color) 50%);
            border-radius: 0 0 8px 0;
        }

        .resize-handle:hover {
            background: linear-gradient(135deg, transparent 50%, var(--accent-blue) 50%);
        }

        .panel-title {
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title .panel-name {
            color: var(--text-primary);
        }

        .panel-title .panel-profile {
            font-size: 10px;
            font-weight: 400;
            color: var(--accent-blue);
            background: rgba(88, 166, 255, 0.15);
            padding: 2px 8px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .panel-title .finviz-badge {
            color: var(--accent-green-light);
            background: rgba(46, 160, 67, 0.2);
        }

        .panel-title .count {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: 10px;
        }

        .panel-actions {
            display: flex;
            gap: 6px;
        }

        .panel-content {
            flex: 1;
            overflow: auto;
        }

        /* Filters Bar */
        .filters-bar {
            padding: 8px 12px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
        }

        .filter-group label {
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .filter-input {
            width: 60px;
            padding: 4px 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 11px;
        }

        .filter-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .filter-select {
            padding: 4px 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 11px;
        }

        .filter-checkbox {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .filter-checkbox input {
            cursor: pointer;
        }

        .filter-divider {
            width: 1px;
            height: 20px;
            background: var(--border-color);
            margin: 0 4px;
        }

        /* Scanner Table */
        .scanner-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .scanner-table th {
            position: sticky;
            top: 0;
            background: var(--bg-tertiary);
            padding: 8px 10px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }

        .scanner-table th:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .scanner-table th.sorted-asc::after { content: ' ▲'; font-size: 9px; }
        .scanner-table th.sorted-desc::after { content: ' ▼'; font-size: 9px; }

        .scanner-table td {
            padding: 6px 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .scanner-table tr:hover { background: var(--bg-tertiary); }

        .scanner-table tr.highlight {
            background: rgba(35, 134, 54, 0.1);
            animation: flash 0.5s;
        }

        @keyframes flash {
            0% { background: rgba(35, 134, 54, 0.3); }
            100% { background: rgba(35, 134, 54, 0.1); }
        }

        .cell-symbol {
            font-weight: 600;
            color: var(--accent-blue);
            cursor: pointer;
        }

        .cell-symbol:hover { text-decoration: underline; }

        .cell-price { font-family: 'SF Mono', Monaco, monospace; }

        .cell-positive { color: var(--accent-green-light); }
        .cell-negative { color: var(--accent-red); }

        .cell-score {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
        }

        .cell-score.high { background: rgba(35, 134, 54, 0.25); color: var(--accent-green-light); }
        .cell-score.medium { background: rgba(210, 153, 34, 0.25); color: var(--accent-yellow); }
        .cell-score.low { background: rgba(139, 148, 158, 0.15); color: var(--text-secondary); }

        .cell-bar {
            width: 50px;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
        }

        .cell-bar-fill {
            height: 100%;
            background: var(--accent-blue);
            transition: width 0.3s;
        }

        /* HOD Highlighting */
        tr.at-hod {
            background: rgba(35, 134, 54, 0.15) !important;
            animation: hod-pulse 2s infinite;
        }

        tr.near-hod {
            background: rgba(210, 153, 34, 0.1) !important;
        }

        @keyframes hod-pulse {
            0%, 100% { background: rgba(35, 134, 54, 0.15); }
            50% { background: rgba(35, 134, 54, 0.25); }
        }

        .cell-hod {
            font-family: 'SF Mono', Monaco, monospace;
            position: relative;
        }

        .cell-hod.hod-hit {
            color: var(--accent-green-light);
            font-weight: 600;
        }

        .hod-badge {
            display: inline-block;
            margin-left: 4px;
            padding: 1px 4px;
            font-size: 9px;
            font-weight: 700;
            background: var(--accent-green);
            color: white;
            border-radius: 3px;
            animation: badge-flash 1s infinite;
        }

        @keyframes badge-flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-secondary);
            text-align: center;
        }

        .empty-state svg { margin-bottom: 12px; opacity: 0.5; }

        /* Add Panel Card */
        .add-panel-card {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .add-panel-card:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: rgba(88, 166, 255, 0.05);
        }

        .add-panel-card svg { margin-bottom: 8px; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            width: 550px;
            max-width: 95%;
            max-height: 90vh;
            overflow: auto;
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 { font-size: 16px; }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
        }

        .modal-close:hover { color: var(--text-primary); }

        .modal-body { padding: 20px; }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* Form */
        .form-section {
            margin-bottom: 20px;
        }

        .form-section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 13px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-row-3 {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .form-hint {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Layout Selector */
        .layout-selector {
            display: flex;
            gap: 8px;
        }

        .layout-option {
            width: 50px;
            height: 35px;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            gap: 2px;
            padding: 4px;
            background: var(--bg-tertiary);
        }

        .layout-option:hover { border-color: var(--text-secondary); }
        .layout-option.active { border-color: var(--accent-blue); }

        .layout-option div {
            background: var(--border-color);
            border-radius: 2px;
            flex: 1;
        }

        /* Tooltip */
        .tooltip {
            position: relative;
        }

        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .tooltip:hover::after { opacity: 1; }

        /* Context Menu */
        .context-menu {
            position: fixed;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 4px 0;
            min-width: 150px;
            z-index: 2000;
            display: none;
        }

        .context-menu.active { display: block; }

        .context-menu-item {
            padding: 8px 14px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .context-menu-item:hover { background: var(--bg-tertiary); }

        .context-menu-divider {
            height: 1px;
            background: var(--border-color);
            margin: 4px 0;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
                </svg>
                MAX_AI <span>Scanner</span>
            </div>
            <div class="status-badge">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connecting...</span>
            </div>
        </div>
        <div class="header-actions">
            <div class="layout-selector">
                <div class="layout-option active" onclick="setLayout('1')" title="1 Panel"><div></div></div>
                <div class="layout-option" onclick="setLayout('2')" title="2 Panels"><div></div><div></div></div>
                <div class="layout-option" onclick="setLayout('3')" title="3 Panels"><div></div><div></div><div></div></div>
                <div class="layout-option" onclick="setLayout('2-1')" title="2:1 Split"><div style="flex:2"></div><div></div></div>
            </div>
            <button class="btn" onclick="openAddPanelModal()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Add Panel
            </button>
            <button class="btn" onclick="saveDashboard()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
                </svg>
                Save Layout
            </button>
        </div>
    </header>

    <div class="dashboard layout-1" id="dashboard">
        <!-- Panels will be added here -->
    </div>

    <!-- Add/Edit Panel Modal -->
    <div class="modal-overlay" id="panelModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="panelModalTitle">Add Scanner Panel</h3>
                <button class="modal-close" onclick="closePanelModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-section">
                    <div class="form-section-title">Panel Settings</div>
                    <div class="form-group">
                        <label>Panel Name</label>
                        <input type="text" id="panelName" placeholder="My Scanner">
                    </div>
                    <div class="form-group">
                        <label>Data Source</label>
                        <select id="panelSource" onchange="toggleSourceOptions()">
                            <option value="scanner">Scanner Profile</option>
                            <option value="finviz">Finviz Top Gainers</option>
                        </select>
                    </div>
                    <div class="form-group" id="profileGroup">
                        <label>Base Profile</label>
                        <select id="panelProfile">
                            <!-- Options populated dynamically -->
                        </select>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-title">Price Filters</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Min Price ($)</label>
                            <input type="number" id="filterMinPrice" placeholder="1" step="0.5">
                        </div>
                        <div class="form-group">
                            <label>Max Price ($)</label>
                            <input type="number" id="filterMaxPrice" placeholder="500" step="10">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-title">Volume & Float Filters</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Min Volume</label>
                            <input type="number" id="filterMinVolume" placeholder="100000" step="10000">
                        </div>
                        <div class="form-group">
                            <label>Min RVOL (x)</label>
                            <input type="number" id="filterMinRvol" placeholder="0" step="0.1">
                            <div class="form-hint">e.g., 1.5 = 150% of average</div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Min Float (K)</label>
                            <input type="number" id="filterMinFloatK" placeholder="e.g. 35" step="10">
                            <div class="form-hint">Min shares in thousands</div>
                        </div>
                        <div class="form-group">
                            <label>Max Float (M)</label>
                            <input type="number" id="filterMaxFloat" placeholder="e.g. 50" step="5">
                            <div class="form-hint">Max shares in millions (low float)</div>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-title">Movement Filters</div>
                    <div class="form-row form-row-3">
                        <div class="form-group">
                            <label>Min Change %</label>
                            <input type="number" id="filterMinChange" placeholder="0" step="0.5">
                        </div>
                        <div class="form-group">
                            <label>Max Change %</label>
                            <input type="number" id="filterMaxChange" placeholder="100" step="1">
                        </div>
                        <div class="form-group">
                            <label>Min HOD %</label>
                            <input type="number" id="filterMinHod" placeholder="0" step="5" min="0" max="100">
                            <div class="form-hint">Near high of day</div>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-title">AI & Scoring</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Min AI Score</label>
                            <input type="number" id="filterMinAI" placeholder="0" step="0.1" min="0" max="1">
                        </div>
                        <div class="form-group">
                            <label>Min Velocity</label>
                            <input type="number" id="filterMinVelocity" placeholder="0" step="0.1">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-title">Display Options</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Max Rows</label>
                            <input type="number" id="filterMaxRows" value="50" min="10" max="200">
                        </div>
                        <div class="form-group">
                            <label>Sort By</label>
                            <select id="filterSortBy">
                                <option value="ai_score">AI Score</option>
                                <option value="change_pct">Change %</option>
                                <option value="volume">Volume</option>
                                <option value="float_shares">Float (Low First)</option>
                                <option value="rvol">RVOL</option>
                                <option value="hod_proximity">HOD %</option>
                                <option value="velocity">Velocity</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closePanelModal()">Cancel</button>
                <button class="btn btn-primary" onclick="savePanel()">Add Panel</button>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" onclick="editPanel()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            Edit Filters
        </div>
        <div class="context-menu-item" onclick="duplicatePanel()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Duplicate
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" onclick="removePanel()" style="color: var(--accent-red);">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
            Remove
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8787';

        let profiles = [];
        let panels = [];
        let currentLayout = '1';
        let editingPanelId = null;
        let contextPanelId = null;

        // Drag/resize state
        let dragState = null;
        let resizeState = null;

        // Data cache for smooth updates
        const panelDataCache = new Map();

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await loadProfiles();
            loadDashboard();
            startAutoRefresh();
            setupEventListeners();
        });

        // Setup event listeners
        function setupEventListeners() {
            // Close context menu on click outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.context-menu')) {
                    document.getElementById('contextMenu').classList.remove('active');
                }
            });

            // Close modals on escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closePanelModal();
                    document.getElementById('contextMenu').classList.remove('active');
                }
            });

            // Global mouse events for drag/resize
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', handleMouseUp);
        }

        // Calculate default position for new panels
        function getDefaultPosition(index) {
            const cols = Math.ceil(Math.sqrt(panels.length));
            const row = Math.floor(index / cols);
            const col = index % cols;
            return {
                x: 12 + col * 620,
                y: 12 + row * 420
            };
        }

        // Start dragging a panel
        function startDrag(event, panelId) {
            // Don't drag if clicking on interactive elements
            if (event.target.closest('button, input, select, .resize-handle')) return;

            const panelEl = document.querySelector(`[data-panel-id="${panelId}"]`);
            if (!panelEl) return;

            event.preventDefault();
            panelEl.classList.add('dragging');

            // Bring to front
            document.querySelectorAll('.panel').forEach(p => p.style.zIndex = '1');
            panelEl.style.zIndex = '100';

            dragState = {
                panelId,
                startX: event.clientX,
                startY: event.clientY,
                origX: parseInt(panelEl.style.left) || 0,
                origY: parseInt(panelEl.style.top) || 0
            };
        }

        // Start resizing a panel
        function startResize(event, panelId) {
            event.preventDefault();
            event.stopPropagation();

            const panelEl = document.querySelector(`[data-panel-id="${panelId}"]`);
            if (!panelEl) return;

            resizeState = {
                panelId,
                startX: event.clientX,
                startY: event.clientY,
                origWidth: panelEl.offsetWidth,
                origHeight: panelEl.offsetHeight
            };
        }

        // Handle mouse move for drag/resize
        function handleMouseMove(event) {
            if (dragState) {
                const panelEl = document.querySelector(`[data-panel-id="${dragState.panelId}"]`);
                if (!panelEl) return;

                const dx = event.clientX - dragState.startX;
                const dy = event.clientY - dragState.startY;

                panelEl.style.left = Math.max(0, dragState.origX + dx) + 'px';
                panelEl.style.top = Math.max(0, dragState.origY + dy) + 'px';
            }

            if (resizeState) {
                const panelEl = document.querySelector(`[data-panel-id="${resizeState.panelId}"]`);
                if (!panelEl) return;

                const dx = event.clientX - resizeState.startX;
                const dy = event.clientY - resizeState.startY;

                const newWidth = Math.max(400, resizeState.origWidth + dx);
                const newHeight = Math.max(250, resizeState.origHeight + dy);

                panelEl.style.width = newWidth + 'px';
                panelEl.style.height = newHeight + 'px';
            }
        }

        // Handle mouse up - end drag/resize and save positions
        function handleMouseUp(event) {
            if (dragState) {
                const panelEl = document.querySelector(`[data-panel-id="${dragState.panelId}"]`);
                if (panelEl) {
                    panelEl.classList.remove('dragging');

                    // Save position to panel data
                    const panel = panels.find(p => p.id === dragState.panelId);
                    if (panel) {
                        panel.position = {
                            x: parseInt(panelEl.style.left) || 0,
                            y: parseInt(panelEl.style.top) || 0
                        };
                    }
                }
                dragState = null;
            }

            if (resizeState) {
                const panelEl = document.querySelector(`[data-panel-id="${resizeState.panelId}"]`);
                if (panelEl) {
                    // Save size to panel data
                    const panel = panels.find(p => p.id === resizeState.panelId);
                    if (panel) {
                        panel.size = {
                            width: panelEl.offsetWidth,
                            height: panelEl.offsetHeight
                        };
                    }
                }
                resizeState = null;
            }
        }

        // Load profiles from API
        async function loadProfiles() {
            try {
                const res = await fetch(`${API_BASE}/profiles`);
                const data = await res.json();
                profiles = data.profiles;

                // Populate profile select
                const select = document.getElementById('panelProfile');
                select.innerHTML = profiles.map(p =>
                    `<option value="${p.name}">${p.name.replace(/_/g, ' ')}</option>`
                ).join('');

                setStatus(true);
            } catch (err) {
                console.error('Failed to load profiles:', err);
                setStatus(false);
            }
        }

        // Toggle source options visibility
        function toggleSourceOptions() {
            const source = document.getElementById('panelSource').value;
            const profileGroup = document.getElementById('profileGroup');
            profileGroup.style.display = source === 'scanner' ? 'block' : 'none';
        }

        // Load saved dashboard from localStorage
        function loadDashboard() {
            const saved = localStorage.getItem('maxai_dashboard');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    panels = data.panels || [];
                    currentLayout = data.layout || '1';
                } catch (e) {
                    panels = [];
                }
            }

            // Default panel if empty
            if (panels.length === 0) {
                panels = [{
                    id: generateId(),
                    name: 'All Movers',
                    source: 'scanner',
                    profile: 'ALL_MOVERS',
                    filters: {},
                    sortBy: 'ai_score',
                    sortDir: 'desc',
                    maxRows: 50
                }];
            }

            setLayout(currentLayout);
            renderPanels();
        }

        // Save dashboard to localStorage
        function saveDashboard() {
            localStorage.setItem('maxai_dashboard', JSON.stringify({
                layout: currentLayout,
                panels: panels
            }));
            showToast('Dashboard saved!');
        }

        // Set layout
        function setLayout(layout) {
            currentLayout = layout;
            const dashboard = document.getElementById('dashboard');
            dashboard.className = `dashboard layout-${layout}`;

            // Update layout selector
            document.querySelectorAll('.layout-option').forEach(el => {
                el.classList.toggle('active', el.getAttribute('onclick').includes(`'${layout}'`));
            });
        }

        // Render all panels
        function renderPanels() {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = panels.map(panel => createPanelHTML(panel)).join('');

            // Load data for each panel
            panels.forEach(panel => loadPanelData(panel.id));
        }

        // Create panel HTML
        function createPanelHTML(panel) {
            const isFinviz = panel.source === 'finviz';
            const sourceLabel = isFinviz ? 'FINVIZ' : panel.profile.replace(/_/g, ' ');
            const sourceBadgeClass = isFinviz ? 'panel-profile finviz-badge' : 'panel-profile';

            // Different columns for Finviz vs Scanner
            const headers = isFinviz ? `
                <th onclick="sortPanel('${panel.id}', 'rank')">#</th>
                <th onclick="sortPanel('${panel.id}', 'symbol')">Symbol</th>
                <th onclick="sortPanel('${panel.id}', 'price')">Price</th>
                <th onclick="sortPanel('${panel.id}', 'change_pct')">Chg %</th>
                <th onclick="sortPanel('${panel.id}', 'volume')">Volume</th>
                <th onclick="sortPanel('${panel.id}', 'float_shares')">Float</th>
                <th onclick="sortPanel('${panel.id}', 'avg_volume')">Avg Vol</th>
                <th onclick="sortPanel('${panel.id}', 'short_float')">Short%</th>
                <th onclick="sortPanel('${panel.id}', 'market_cap')">Mkt Cap</th>
            ` : `
                <th onclick="sortPanel('${panel.id}', 'rank')">#</th>
                <th onclick="sortPanel('${panel.id}', 'symbol')">Symbol</th>
                <th onclick="sortPanel('${panel.id}', 'last_price')">Price</th>
                <th onclick="sortPanel('${panel.id}', 'change_pct')">Chg %</th>
                <th onclick="sortPanel('${panel.id}', 'volume')">Volume</th>
                <th onclick="sortPanel('${panel.id}', 'float_shares')">Float</th>
                <th onclick="sortPanel('${panel.id}', 'rvol')">RVOL</th>
                <th onclick="sortPanel('${panel.id}', 'velocity')">Vel</th>
                <th onclick="sortPanel('${panel.id}', 'high')">HOD</th>
                <th onclick="sortPanel('${panel.id}', 'ai_score')">AI</th>
            `;

            // Get saved position/size or calculate default
            const pos = panel.position || getDefaultPosition(panels.indexOf(panel));
            const size = panel.size || { width: 600, height: 400 };

            return `
                <div class="panel" data-panel-id="${panel.id}"
                     style="left: ${pos.x}px; top: ${pos.y}px; width: ${size.width}px; height: ${size.height}px;"
                     onmousedown="startDrag(event, '${panel.id}')">
                    <div class="panel-header">
                        <div class="panel-title">
                            <span class="panel-name">${panel.name}</span>
                            <span class="${sourceBadgeClass}">${sourceLabel}</span>
                            <span class="count" id="count-${panel.id}">0</span>
                        </div>
                        <div class="panel-actions">
                            <button class="btn btn-sm btn-icon tooltip" data-tooltip="Refresh" onclick="event.stopPropagation(); loadPanelData('${panel.id}')">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
                                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                                </svg>
                            </button>
                            <button class="btn btn-sm btn-icon tooltip" data-tooltip="Settings" onclick="event.stopPropagation(); showContextMenu(event, '${panel.id}')">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="filters-bar">
                        ${createFiltersBarHTML(panel)}
                    </div>
                    <div class="panel-content">
                        <table class="scanner-table">
                            <thead>
                                <tr>${headers}</tr>
                            </thead>
                            <tbody id="tbody-${panel.id}">
                                <tr><td colspan="10" class="empty-state">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="resize-handle" onmousedown="startResize(event, '${panel.id}')"></div>
                </div>
            `;
        }

        // Create filters bar HTML
        function createFiltersBarHTML(panel) {
            const f = panel.filters || {};
            return `
                <div class="filter-group">
                    <label>$</label>
                    <input type="number" class="filter-input" placeholder="Min" value="${f.minPrice || ''}"
                           onchange="updatePanelFilter('${panel.id}', 'minPrice', this.value)">
                    <span>-</span>
                    <input type="number" class="filter-input" placeholder="Max" value="${f.maxPrice || ''}"
                           onchange="updatePanelFilter('${panel.id}', 'maxPrice', this.value)">
                </div>
                <div class="filter-divider"></div>
                <div class="filter-group">
                    <label>Chg%</label>
                    <input type="number" class="filter-input" placeholder="Min" value="${f.minChange || ''}"
                           onchange="updatePanelFilter('${panel.id}', 'minChange', this.value)">
                </div>
                <div class="filter-divider"></div>
                <div class="filter-group">
                    <label>RVOL≥</label>
                    <input type="number" class="filter-input" placeholder="0" value="${f.minRvol || ''}"
                           onchange="updatePanelFilter('${panel.id}', 'minRvol', this.value)" step="0.1">
                </div>
                <div class="filter-divider"></div>
                <div class="filter-group">
                    <label>HOD≥</label>
                    <input type="number" class="filter-input" placeholder="0" value="${f.minHod || ''}"
                           onchange="updatePanelFilter('${panel.id}', 'minHod', this.value)">%
                </div>
                <div class="filter-divider"></div>
                <div class="filter-group">
                    <label>Float</label>
                    <input type="number" class="filter-input" placeholder="Min" value="${f.minFloatK || ''}"
                           onchange="updatePanelFilter('${panel.id}', 'minFloatK', this.value)">K
                    <span>-</span>
                    <input type="number" class="filter-input" placeholder="Max" value="${f.maxFloat || ''}"
                           onchange="updatePanelFilter('${panel.id}', 'maxFloat', this.value)">M
                </div>
                <div class="filter-divider"></div>
                <div class="filter-group">
                    <label>AI≥</label>
                    <input type="number" class="filter-input" placeholder="0" value="${f.minAI || ''}"
                           onchange="updatePanelFilter('${panel.id}', 'minAI', this.value)" step="0.1">
                </div>
            `;
        }

        // Update panel filter
        function updatePanelFilter(panelId, key, value) {
            const panel = panels.find(p => p.id === panelId);
            if (panel) {
                panel.filters = panel.filters || {};
                panel.filters[key] = value ? parseFloat(value) : null;
                loadPanelData(panelId);
            }
        }

        // Load panel data
        async function loadPanelData(panelId) {
            const panel = panels.find(p => p.id === panelId);
            if (!panel) return;

            try {
                let rows = [];

                if (panel.source === 'finviz') {
                    // Fetch from Finviz endpoint
                    const f = panel.filters || {};
                    const params = new URLSearchParams({
                        max_price: f.maxPrice || 20,
                        limit: panel.maxRows || 50
                    });
                    if (f.maxFloat) params.append('max_float', f.maxFloat);
                    if (f.minChange) params.append('min_change', f.minChange);

                    const res = await fetch(`${API_BASE}/finviz/top-gainers?${params}`);
                    const data = await res.json();
                    rows = data.gainers || [];

                    // Normalize field names for sorting
                    rows = rows.map((r, i) => ({
                        ...r,
                        rank: i + 1,
                        last_price: r.price
                    }));
                } else {
                    // Fetch from scanner endpoint
                    const res = await fetch(`${API_BASE}/scanner/rows?profile=${panel.profile}&limit=${panel.maxRows || 100}`);
                    const data = await res.json();
                    rows = data.rows || [];
                }

                // Apply client-side filters
                rows = applyFilters(rows, panel.filters, panel.source);

                // Sort
                const defaultSort = panel.source === 'finviz' ? 'change_pct' : 'ai_score';
                rows = sortRows(rows, panel.sortBy || defaultSort, panel.sortDir || 'desc');

                // Limit
                rows = rows.slice(0, panel.maxRows || 50);

                // Render
                renderPanelTable(panelId, rows, panel.source);
                document.getElementById(`count-${panelId}`).textContent = rows.length;

                setStatus(true);
            } catch (err) {
                console.error(`Failed to load panel ${panelId}:`, err);
                setStatus(false);
            }
        }

        // Apply filters to rows
        function applyFilters(rows, filters, source) {
            if (!filters) return rows;

            return rows.filter(row => {
                // Price filter - use 'price' for Finviz, 'last_price' for scanner
                const price = row.last_price || row.price || 0;
                if (filters.minPrice && price < filters.minPrice) return false;
                if (filters.maxPrice && price > filters.maxPrice) return false;

                // Change filter
                if (filters.minChange && row.change_pct < filters.minChange) return false;
                if (filters.maxChange && row.change_pct > filters.maxChange) return false;

                // Scanner-specific filters (skip for Finviz)
                if (source !== 'finviz') {
                    if (filters.minRvol && row.rvol < filters.minRvol) return false;
                    if (filters.minHod && (row.hod_proximity * 100) < filters.minHod) return false;
                    if (filters.minAI && row.ai_score < filters.minAI) return false;
                    if (filters.minVelocity && row.velocity < filters.minVelocity) return false;
                }

                // Volume filter
                if (filters.minVolume && row.volume < filters.minVolume) return false;

                // Float filter (minFloatK in thousands, maxFloat in millions)
                if (filters.maxFloat && row.float_shares > 0 && row.float_shares > filters.maxFloat) return false;
                // minFloatK is in thousands, convert to millions for comparison
                if (filters.minFloatK && (row.float_shares || 0) < (filters.minFloatK / 1000)) return false;
                if (filters.minFloat && (row.float_shares || 0) < filters.minFloat) return false;
                return true;
            });
        }

        // Sort rows
        function sortRows(rows, sortBy, sortDir) {
            return [...rows].sort((a, b) => {
                const aVal = a[sortBy] || 0;
                const bVal = b[sortBy] || 0;
                return sortDir === 'asc' ? aVal - bVal : bVal - aVal;
            });
        }

        // Sort panel by column
        function sortPanel(panelId, column) {
            const panel = panels.find(p => p.id === panelId);
            if (!panel) return;

            if (panel.sortBy === column) {
                panel.sortDir = panel.sortDir === 'asc' ? 'desc' : 'asc';
            } else {
                panel.sortBy = column;
                panel.sortDir = 'desc';
            }

            loadPanelData(panelId);
        }

        // Render panel table - updates in place to prevent blinking
        function renderPanelTable(panelId, rows, source) {
            const tbody = document.getElementById(`tbody-${panelId}`);
            const isFinviz = source === 'finviz';

            // Get previous data for comparison
            const prevData = panelDataCache.get(panelId) || [];
            panelDataCache.set(panelId, rows);

            if (rows.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="10" class="empty-state">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                        </svg>
                        No stocks match filters
                    </td></tr>
                `;
                return;
            }

            // Build a map of existing rows by symbol
            const existingRows = new Map();
            tbody.querySelectorAll('tr[data-symbol]').forEach(tr => {
                existingRows.set(tr.dataset.symbol, tr);
            });

            // Create new tbody content
            const newSymbols = new Set(rows.map(r => r.symbol));

            // Remove rows for symbols no longer in data
            existingRows.forEach((tr, symbol) => {
                if (!newSymbols.has(symbol)) {
                    tr.remove();
                }
            });

            // Update or create rows
            rows.forEach((row, i) => {
                let tr = existingRows.get(row.symbol);
                const isNew = !tr;

                if (isNew) {
                    tr = document.createElement('tr');
                    tr.dataset.symbol = row.symbol;
                }

                // Check if data changed
                const prevRow = prevData.find(r => r.symbol === row.symbol);
                const priceChanged = prevRow && (
                    (row.last_price || row.price) !== (prevRow.last_price || prevRow.price)
                );

                if (isFinviz) {
                    updateFinvizRow(tr, row, i, priceChanged);
                } else {
                    updateScannerRow(tr, row, i, priceChanged);
                }

                // Position the row correctly
                const currentIndex = Array.from(tbody.children).indexOf(tr);
                if (currentIndex !== i) {
                    if (i === 0) {
                        tbody.prepend(tr);
                    } else {
                        const prevTr = tbody.children[i - 1];
                        if (prevTr) {
                            prevTr.after(tr);
                        } else {
                            tbody.appendChild(tr);
                        }
                    }
                }

                // Flash effect for price changes
                if (priceChanged && !isNew) {
                    tr.classList.add('highlight');
                    setTimeout(() => tr.classList.remove('highlight'), 500);
                }
            });
        }

        // Update a Finviz row in place
        function updateFinvizRow(tr, row, index, priceChanged) {
            const floatShares = row.float_shares || 0;
            const isLowFloat = floatShares > 0 && floatShares < 20;
            const isVeryLowFloat = floatShares > 0 && floatShares < 5;

            tr.className = isVeryLowFloat ? 'at-hod' : '';

            tr.innerHTML = `
                <td>${index + 1}</td>
                <td class="cell-symbol" onclick="showSymbolDetails('${row.symbol}')">${row.symbol}</td>
                <td class="cell-price">$${row.price.toFixed(2)}</td>
                <td class="${row.change_pct >= 0 ? 'cell-positive' : 'cell-negative'}">
                    ${row.change_pct >= 0 ? '+' : ''}${row.change_pct.toFixed(2)}%
                </td>
                <td>${formatVolume(row.volume)}</td>
                <td class="${isLowFloat ? 'cell-positive' : ''}" style="${isVeryLowFloat ? 'font-weight:bold' : ''}">${formatFloat(floatShares)}</td>
                <td>${formatVolume(row.avg_volume)}</td>
                <td>${row.short_float || '-'}</td>
                <td>${formatMarketCap(row.market_cap)}</td>
            `;
        }

        // Update a Scanner row in place
        function updateScannerRow(tr, row, index, priceChanged) {
            const isAtHOD = row.hod_proximity >= 0.98;
            const isNearHOD = row.hod_proximity >= 0.95 && row.hod_proximity < 0.98;
            const floatShares = row.float_shares || 0;
            const isLowFloat = floatShares > 0 && floatShares < 20;

            tr.className = isAtHOD ? 'at-hod' : (isNearHOD ? 'near-hod' : '');

            tr.innerHTML = `
                <td>${index + 1}</td>
                <td class="cell-symbol" onclick="showSymbolDetails('${row.symbol}')">${row.symbol}</td>
                <td class="cell-price">$${row.last_price.toFixed(2)}</td>
                <td class="${row.change_pct >= 0 ? 'cell-positive' : 'cell-negative'}">
                    ${row.change_pct >= 0 ? '+' : ''}${row.change_pct.toFixed(2)}%
                </td>
                <td>${formatVolume(row.volume)}</td>
                <td class="${isLowFloat ? 'cell-positive' : ''}">${formatFloat(floatShares)}</td>
                <td>${(row.rvol || 0).toFixed(1)}x</td>
                <td>${(row.velocity || 0).toFixed(2)}</td>
                <td class="cell-hod ${isAtHOD ? 'hod-hit' : ''}">
                    $${(row.high || 0).toFixed(2)}
                    ${isAtHOD ? '<span class="hod-badge">HOD!</span>' : ''}
                </td>
                <td><span class="cell-score ${getScoreClass(row.ai_score || 0)}">${(row.ai_score || 0).toFixed(2)}</span></td>
            `;
        }

        // Format volume
        function formatVolume(vol) {
            if (vol >= 1000000) return (vol / 1000000).toFixed(1) + 'M';
            if (vol >= 1000) return (vol / 1000).toFixed(0) + 'K';
            return vol;
        }

        // Format float (in millions)
        function formatFloat(floatM) {
            if (!floatM || floatM === 0) return '-';
            if (floatM >= 1000) return (floatM / 1000).toFixed(1) + 'B';
            if (floatM >= 1) return floatM.toFixed(1) + 'M';
            return (floatM * 1000).toFixed(0) + 'K';
        }

        // Format market cap (in millions)
        function formatMarketCap(mcM) {
            if (!mcM || mcM === 0) return '-';
            if (mcM >= 1000) return '$' + (mcM / 1000).toFixed(1) + 'B';
            return '$' + mcM.toFixed(0) + 'M';
        }

        // Get score class
        function getScoreClass(score) {
            if (score >= 0.7) return 'high';
            if (score >= 0.4) return 'medium';
            return 'low';
        }

        // Show symbol details (placeholder)
        function showSymbolDetails(symbol) {
            window.open(`https://finviz.com/quote.ashx?t=${symbol}`, '_blank');
        }

        // Set connection status
        function setStatus(connected) {
            document.getElementById('statusDot').className = 'status-dot' + (connected ? '' : ' error');
            document.getElementById('statusText').textContent = connected ? 'Live' : 'Disconnected';
        }

        // Auto refresh
        function startAutoRefresh() {
            setInterval(() => {
                panels.forEach(p => loadPanelData(p.id));
            }, 2000);
        }

        // Generate ID
        function generateId() {
            return 'panel_' + Math.random().toString(36).substr(2, 9);
        }

        // Panel Modal
        function openAddPanelModal() {
            editingPanelId = null;
            document.getElementById('panelModalTitle').textContent = 'Add Scanner Panel';
            document.getElementById('panelName').value = '';
            document.getElementById('panelSource').value = 'scanner';
            toggleSourceOptions();
            document.getElementById('filterMinPrice').value = '';
            document.getElementById('filterMaxPrice').value = '';
            document.getElementById('filterMinVolume').value = '';
            document.getElementById('filterMinRvol').value = '';
            document.getElementById('filterMinChange').value = '';
            document.getElementById('filterMaxChange').value = '';
            document.getElementById('filterMinHod').value = '';
            document.getElementById('filterMinAI').value = '';
            document.getElementById('filterMinVelocity').value = '';
            document.getElementById('filterMinFloatK').value = '';
            document.getElementById('filterMaxFloat').value = '';
            document.getElementById('filterMaxRows').value = '50';
            document.getElementById('panelModal').classList.add('active');
        }

        function closePanelModal() {
            document.getElementById('panelModal').classList.remove('active');
            editingPanelId = null;
        }

        function savePanel() {
            const name = document.getElementById('panelName').value || 'Scanner';
            const source = document.getElementById('panelSource').value;
            const profile = document.getElementById('panelProfile').value;

            const filters = {
                minPrice: parseFloat(document.getElementById('filterMinPrice').value) || null,
                maxPrice: parseFloat(document.getElementById('filterMaxPrice').value) || null,
                minVolume: parseFloat(document.getElementById('filterMinVolume').value) || null,
                minRvol: parseFloat(document.getElementById('filterMinRvol').value) || null,
                minChange: parseFloat(document.getElementById('filterMinChange').value) || null,
                maxChange: parseFloat(document.getElementById('filterMaxChange').value) || null,
                minHod: parseFloat(document.getElementById('filterMinHod').value) || null,
                minAI: parseFloat(document.getElementById('filterMinAI').value) || null,
                minVelocity: parseFloat(document.getElementById('filterMinVelocity').value) || null,
                minFloatK: parseFloat(document.getElementById('filterMinFloatK').value) || null,
                maxFloat: parseFloat(document.getElementById('filterMaxFloat').value) || null
            };

            const sortBy = document.getElementById('filterSortBy').value;
            const maxRows = parseInt(document.getElementById('filterMaxRows').value) || 50;

            if (editingPanelId) {
                // Update existing panel
                const panel = panels.find(p => p.id === editingPanelId);
                if (panel) {
                    panel.name = name;
                    panel.source = source;
                    panel.profile = profile;
                    panel.filters = filters;
                    panel.sortBy = sortBy;
                    panel.maxRows = maxRows;
                }
            } else {
                // Add new panel
                panels.push({
                    id: generateId(),
                    name,
                    source,
                    profile,
                    filters,
                    sortBy,
                    sortDir: 'desc',
                    maxRows
                });
            }

            closePanelModal();
            renderPanels();
            saveDashboard();
        }

        // Context menu
        function showContextMenu(event, panelId) {
            event.stopPropagation();
            contextPanelId = panelId;
            const menu = document.getElementById('contextMenu');
            menu.style.left = event.clientX + 'px';
            menu.style.top = event.clientY + 'px';
            menu.classList.add('active');
        }

        function editPanel() {
            const panel = panels.find(p => p.id === contextPanelId);
            if (!panel) return;

            editingPanelId = contextPanelId;
            document.getElementById('panelModalTitle').textContent = 'Edit Scanner Panel';
            document.getElementById('panelName').value = panel.name;
            document.getElementById('panelSource').value = panel.source || 'scanner';
            toggleSourceOptions();
            document.getElementById('panelProfile').value = panel.profile || '';
            document.getElementById('filterMinPrice').value = panel.filters?.minPrice || '';
            document.getElementById('filterMaxPrice').value = panel.filters?.maxPrice || '';
            document.getElementById('filterMinVolume').value = panel.filters?.minVolume || '';
            document.getElementById('filterMinRvol').value = panel.filters?.minRvol || '';
            document.getElementById('filterMinChange').value = panel.filters?.minChange || '';
            document.getElementById('filterMaxChange').value = panel.filters?.maxChange || '';
            document.getElementById('filterMinHod').value = panel.filters?.minHod || '';
            document.getElementById('filterMinAI').value = panel.filters?.minAI || '';
            document.getElementById('filterMinVelocity').value = panel.filters?.minVelocity || '';
            document.getElementById('filterMinFloatK').value = panel.filters?.minFloatK || '';
            document.getElementById('filterMaxFloat').value = panel.filters?.maxFloat || '';
            document.getElementById('filterMaxRows').value = panel.maxRows || 50;
            document.getElementById('filterSortBy').value = panel.sortBy || 'ai_score';

            document.getElementById('contextMenu').classList.remove('active');
            document.getElementById('panelModal').classList.add('active');
        }

        function duplicatePanel() {
            const panel = panels.find(p => p.id === contextPanelId);
            if (!panel) return;

            panels.push({
                ...JSON.parse(JSON.stringify(panel)),
                id: generateId(),
                name: panel.name + ' (Copy)'
            });

            document.getElementById('contextMenu').classList.remove('active');
            renderPanels();
        }

        function removePanel() {
            if (panels.length <= 1) {
                alert('Cannot remove the last panel');
                return;
            }

            panels = panels.filter(p => p.id !== contextPanelId);
            document.getElementById('contextMenu').classList.remove('active');
            renderPanels();
        }

        // Toast notification
        function showToast(message) {
            // Simple alert for now
            console.log(message);
        }
    </script>
</body>
</html>
