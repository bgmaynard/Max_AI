name: FAST_MOVERS
description: High velocity momentum stocks with strong price movement

enabled: true

conditions:
  - field: change_pct
    operator: gte
    value: 2.0
  - field: velocity
    operator: gt
    value: 0.2
  - field: rvol
    operator: gte
    value: 1.0

weights:
