name: FAST_MOVERS
description: Acceleration-based momentum detection (pre-breakout)

enabled: true

conditions:
  - field: velocity
    operator: gt
    value: 0.0
  - field: rvol
    operator: gte
    value: 1.0

weights:
  change_pct: 0.5
  velocity: 2.0
  rvol: 1.5
  hod_proximity: 1.0
  spread: 0.5
  volume: 0.5

min_price: 2.0
max_price: 20.0
min_volume: 100000

alert_enabled: true
alert_sound: momo_surge.wav
alert_threshold: 0.60
