  velocity: 2.0
  rvol: 1.5
  hod_proximity: 1.0
  spread: 0.5
  volume: 0.5

min_price: 2.0
max_price: 300.0
min_volume: 200000

alert_enabled: true
alert_sound: momo_surge.wav
alert_threshold: 0.75
